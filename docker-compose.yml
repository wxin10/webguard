version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://webguard:webguard@db:5432/webguard
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_ENABLED=${DEEPSEEK_ENABLED:-auto}
      - DEEPSEEK_TIMEOUT_SECONDS=${DEEPSEEK_TIMEOUT_SECONDS:-20}
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://127.0.0.1:5173,http://localhost:5173,chrome-extension://__EXTENSION_ID__
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - webguard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=http://127.0.0.1:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - webguard-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=webguard
      - POSTGRES_PASSWORD=webguard
      - POSTGRES_DB=webguard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - webguard-network

volumes:
  postgres-data:

networks:
  webguard-network:
    driver: bridge
