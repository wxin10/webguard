<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>WebGuard</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">WebGuard</p>
          <h1>网站安全状态</h1>
        </div>
        <span id="connection-status" class="status unknown">检测中</span>
      </header>

      <section class="url-card">
        <span>当前网址</span>
        <strong id="current-url">读取中...</strong>
      </section>

      <section id="result-card" class="result-card">
        <p class="muted">暂无检测结果，可点击下方按钮扫描当前网页。</p>
      </section>

      <div class="actions">
        <button id="scan-button" class="primary">扫描当前页面</button>
        <button id="report-button" class="secondary">查看详细报告</button>
        <button id="options-button" class="ghost">设置</button>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
