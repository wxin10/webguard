<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>WebGuard 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <p class="eyebrow">WebGuard Extension</p>
        <h1>插件设置</h1>
        <p class="subtitle">配置后端连接、自动检测和恶意网站主动拦截策略。</p>
      </header>

      <section class="card">
        <h2>后台连接</h2>
        <label for="api-base-url">API 地址</label>
        <input id="api-base-url" type="text" />
        <p class="hint">默认 http://127.0.0.1:8000</p>
        <label for="frontend-base-url">Web 报告页地址</label>
        <input id="frontend-base-url" type="text" />
        <p class="hint">默认 http://127.0.0.1:5173</p>
      </section>

      <section class="card">
        <h2>检测行为</h2>
        <label class="switch-row">
          <span>
            <strong>自动检测网页</strong>
            <small>打开新页面后自动发送页面特征到后台。</small>
          </span>
          <input id="auto-detect" type="checkbox" />
        </label>
        <label class="switch-row">
          <span>
            <strong>自动拦截恶意网站</strong>
            <small>恶意结论会跳转到 WebGuard warning 页面。</small>
          </span>
          <input id="auto-block" type="checkbox" />
        </label>
      </section>

      <div class="footer">
        <button id="save-button">保存设置</button>
        <span id="message"></span>
      </div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
