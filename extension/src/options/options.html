<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGuard 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <p class="eyebrow">WebGuard 浏览器助手</p>
        <h1>浏览器助手设置</h1>
        <p class="subtitle">浏览器助手负责当前页面扫描、安全预警、即时处置和事件回传；策略、报告和历史记录以网站主平台为准。</p>
      </header>

      <section class="card">
        <h2>连接平台账号</h2>
        <label for="api-base-url">API 地址</label>
        <input id="api-base-url" type="url" placeholder="http://127.0.0.1:8000" />
        <p class="hint">用于连接 WebGuard 后端服务。</p>

        <label for="web-base-url">Web 地址</label>
        <input id="web-base-url" type="url" placeholder="http://127.0.0.1:5173" />
        <p class="hint">用于打开网站报告和站点策略页面。</p>

        <details class="advanced-config">
          <summary>高级连接配置</summary>
          <label for="access-token">访问凭证</label>
          <input id="access-token" type="password" autocomplete="off" placeholder="可选访问凭证" />
          <p class="hint">仅在无法完成账号绑定时使用，常规连接请优先使用下方绑定流程。</p>

          <label for="plugin-instance-id">助手实例标识</label>
          <input id="plugin-instance-id" type="text" autocomplete="off" placeholder="assistant-instance-id" />
          <p class="hint">用于识别当前浏览器助手实例。</p>
        </details>

        <button id="test-button" class="secondary">检查连接并同步策略</button>
        <p id="test-message" class="message" role="status"></p>
      </section>

      <section class="card">
        <h2>绑定浏览器助手</h2>
        <p class="hint">发起绑定后，请在 WebGuard 平台确认验证码，再回到这里完成连接。</p>
        <div class="binding-grid">
          <div>
            <label>绑定验证码</label>
            <code id="binding-code">-</code>
          </div>
          <div>
            <label>确认地址</label>
            <code id="verification-url">-</code>
          </div>
          <div>
            <label>连接状态</label>
            <code id="plugin-token-status">未连接</code>
          </div>
        </div>
        <div class="maintenance-actions">
          <button id="start-binding-button" class="secondary">开始绑定</button>
          <button id="open-verification-button" class="secondary" disabled>打开平台确认页</button>
          <button id="finish-binding-button" class="primary" disabled>完成绑定</button>
        </div>
        <p id="binding-message" class="message" role="status"></p>
      </section>

      <section class="card">
        <h2>执行行为</h2>
        <label class="switch-row">
          <span>
            <strong>自动扫描网页</strong>
            <small>页面加载完成后读取轻量页面特征，并调用后端正式检测。</small>
          </span>
          <input id="auto-detect" type="checkbox" />
        </label>
        <label class="switch-row">
          <span>
            <strong>恶意站点自动拦截</strong>
            <small>检测为恶意时自动跳转到 WebGuard 安全预警页面。</small>
          </span>
          <input id="auto-block" type="checkbox" />
        </label>
        <label class="switch-row">
          <span>
            <strong>可疑站点通知</strong>
            <small>检测为可疑时显示浏览器通知，提醒用户谨慎操作。</small>
          </span>
          <input id="notify-suspicious" type="checkbox" />
        </label>
      </section>

      <section class="card">
        <h2>维护操作</h2>
        <div class="maintenance-actions">
          <button id="clear-cache-button" class="secondary">清空本地运行缓存</button>
          <button id="reset-settings-button" class="danger">重置插件设置</button>
        </div>
        <p class="hint">清空缓存只会移除当前页面状态、最近扫描结果、最近错误和策略快照；长期策略以主平台为准。</p>
      </section>

      <div class="footer">
        <button id="save-button" class="primary">保存设置</button>
        <span id="message" role="status"></span>
      </div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
