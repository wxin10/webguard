<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGuard 安全警告</title>
    <link rel="stylesheet" href="warning.css" />
  </head>
  <body>
    <main class="warning-shell">
      <section class="panel">
        <p class="eyebrow">WebGuard 主动防护</p>
        <h1 id="warning-title">检测到高风险网站</h1>
        <p class="subtitle">该页面可能诱导你提交账号、密码、验证码或支付信息。请确认来源可信后再继续。</p>

        <section class="url-block">
          <span>原始地址</span>
          <strong id="warning-url">读取中...</strong>
        </section>

        <section class="risk-grid">
          <div class="metric">
            <span>风险等级</span>
            <strong id="risk-label">--</strong>
          </div>
          <div class="metric">
            <span>风险分数</span>
            <strong id="risk-score">--</strong>
          </div>
          <div class="metric">
            <span>检测时间</span>
            <strong id="detected-at">--</strong>
          </div>
        </section>

        <section class="detail">
          <h2>检测摘要</h2>
          <p id="risk-summary">正在读取检测结果...</p>
        </section>

        <section class="detail source-detail">
          <h2>检测来源</h2>
          <div id="source-badges" class="source-badges"></div>
          <p id="source-explanation">正在读取检测来源...</p>
        </section>

        <div class="actions">
          <button id="back-button" class="primary">返回安全页面</button>
          <button id="report-button" class="secondary">打开网站详细报告</button>
          <button id="continue-once-button" class="weak">继续访问一次</button>
          <button id="trust-temporary-button" class="secondary">暂时信任此网站</button>
          <button id="trust-permanent-button" class="secondary">信任此网站</button>
        </div>

        <p id="action-message" class="message" role="status"></p>
      </section>
    </main>
    <script type="module" src="warning.js"></script>
  </body>
</html>
